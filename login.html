<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingia - SadeTrade</title>
<style>
  :root{
    --bg:#0b0f1a;
    --card:#131a2b;
    --border:#22304a;
    --accent:#3b82f6;
    --green:#22c55e;
    --red:#ef4444;
    --text:#e5e9f0;
    --muted:#8b97ad;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Segoe UI', sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  .card{
    width:100%;
    max-width:380px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:24px;
  }
  .logo{
    text-align:center;
    margin-bottom:18px;
  }
  .logo .icon{
    font-size:36px;
  }
  .logo h1{
    font-size:20px;
    margin-top:6px;
    background:linear-gradient(135deg, var(--accent), #8b5cf6);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .logo p{
    font-size:12.5px;
    color:var(--muted);
    margin-top:2px;
  }
  .tabs{
    display:flex;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:10px;
    padding:4px;
    margin-bottom:18px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:9px 0;
    border-radius:8px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    color:var(--muted);
    transition:.2s;
  }
  .tab.active{
    background:var(--accent);
    color:#fff;
  }
  .field{
    margin-bottom:14px;
  }
  .field label{
    display:block;
    font-size:12.5px;
    color:var(--muted);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    padding:11px 12px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    font-size:14px;
    outline:none;
  }
  .field input:focus{
    border-color:var(--accent);
  }
  .btn{
    width:100%;
    padding:12px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:14.5px;
    font-weight:700;
    cursor:pointer;
    margin-top:6px;
  }
  .btn:disabled{
    opacity:.6;
    cursor:not-allowed;
  }
  .msg{
    text-align:center;
    font-size:12.5px;
    margin-top:12px;
    min-height:16px;
  }
  .msg.error{color:var(--red);}
  .msg.success{color:var(--green);}
  .switch-text{
    text-align:center;
    font-size:12.5px;
    color:var(--muted);
    margin-top:14px;
  }
  .switch-text a{
    color:var(--accent);
    font-weight:600;
    text-decoration:none;
  }
  .divider{
    display:flex;
    align-items:center;
    gap:8px;
    margin:16px 0;
    color:var(--muted);
    font-size:11px;
  }
  .divider:before, .divider:after{
    content:"";
    flex:1;
    height:1px;
    background:var(--border);
  }
  .hidden{display:none;}
  .btn-google{
    width:100%;
    padding:12px;
    background:var(--bg);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:10px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
  }
  .btn-google:active{
    background:var(--border);
  }
</style>
</head>
<body>

<!-- Blank background shown while checking saved session -->
<div id="authCheck" style="position:fixed; inset:0; background:var(--bg); z-index:999;"></div>

<div class="card hidden" id="loginCard">
  <div class="logo">
    <div class="icon">🤖</div>
    <h1>SadeTrade</h1>
    <p>AI Trading Assistant</p>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabLogin">Ingia</div>
    <div class="tab" id="tabRegister">Jisajili</div>
  </div>


  <!-- LOGIN FORM -->
  <form id="loginForm">
    <div class="field">
      <label>Barua pepe</label>
      <input type="email" id="loginEmail" placeholder="mfano@gmail.com" required>
    </div>
    <div class="field">
      <label>Nenosiri</label>
      <input type="password" id="loginPassword" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn" id="loginBtn">Ingia</button>
    <div class="msg" id="loginMsg"></div>
  </form>

  <!-- REGISTER FORM -->
  <form id="registerForm" class="hidden">
    <div class="field">
      <label>Jina la Mtumiaji</label>
      <input type="text" id="regUsername" placeholder="lightness_tz" required>
    </div>
    <div class="field">
      <label>Barua pepe</label>
      <input type="email" id="regEmail" placeholder="mfano@gmail.com" required>
    </div>
    <div class="field">
      <label>Nenosiri</label>
      <input type="password" id="regPassword" placeholder="Angalau herufi 6" required minlength="6">
    </div>
    <button type="submit" class="btn" id="registerBtn">Jisajili</button>
    <div class="msg" id="registerMsg"></div>
  </form>

  <div class="switch-text">
    Tatizo kuingia? <a href="#" id="forgotLink">Sahau nenosiri</a>
  </div>

  <div class="divider">AU</div>
  <button type="button" class="btn-google" id="googleLoginBtn">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.5 29.5 4.5 24 4.5 12.7 4.5 3.5 13.7 3.5 25S12.7 45.5 24 45.5 44.5 36.3 44.5 25c0-1.5-.2-2.9-.4-4.5z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.5 29.5 4.5 24 4.5c-7.7 0-14.3 4.4-17.7 10.2z"/>
      <path fill="#4CAF50" d="M24 45.5c5.4 0 10.3-1.9 14-5.4l-6.5-5.5c-2 1.4-4.6 2.4-7.5 2.4-5.3 0-9.7-3.3-11.3-7.9l-6.6 5.1C9.6 41 16.2 45.5 24 45.5z"/>
      <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.6l6.5 5.5C41.4 35.8 44.5 30.9 44.5 25c0-1.5-.2-2.9-.4-4.5z"/>
    </svg>
    Ingia na Google
  </button>
  <div class="msg" id="googleMsg"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
  // ===== FIREBASE CONFIG =====
  const firebaseConfig = {
    apiKey: "AIzaSyCF3NcUqw0fxh14iew-zYXDwp3aoomo8Ag",
    authDomain: "sadetrade-6cce2.firebaseapp.com",
    projectId: "sadetrade-6cce2",
    storageBucket: "sadetrade-6cce2.firebasestorage.app",
    messagingSenderId: "7070568393",
    appId: "1:7070568393:web:89443b14b08f1f36c3e218",
    measurementId: "G-8KW59X2V2J"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ===== TAB SWITCHING =====
  const tabLogin = document.getElementById('tabLogin');
  const tabRegister = document.getElementById('tabRegister');
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');

  tabLogin.addEventListener('click', () => {
    tabLogin.classList.add('active');
    tabRegister.classList.remove('active');
    loginForm.classList.remove('hidden');
    registerForm.classList.add('hidden');
  });
  tabRegister.addEventListener('click', () => {
    tabRegister.classList.add('active');
    tabLogin.classList.remove('active');
    registerForm.classList.remove('hidden');
    loginForm.classList.add('hidden');
  });

  // ===== LOGIN =====
  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msg = document.getElementById('loginMsg');
    const btn = document.getElementById('loginBtn');

    btn.disabled = true;
    btn.textContent = "Inaingia...";
    msg.textContent = "";
    msg.className = "msg";

    auth.signInWithEmailAndPassword(email, password)
      .then((cred) => {
        msg.textContent = "Umeingia! Inaelekeza...";
        msg.className = "msg success";
        // Update last login in Firestore
        return db.collection("users").doc(cred.user.uid).set(
          { lastLogin: new Date().toISOString() },
          { merge: true }
        );
      })
      .then(() => {
        setTimeout(() => {
          window.location.href = "index.html";
        }, 800);
      })
      .catch((err) => {
        msg.textContent = translateError(err.code);
        msg.className = "msg error";
        btn.disabled = false;
        btn.textContent = "Ingia";
      });
  });

  // ===== GOOGLE SIGN-IN =====
  document.getElementById('googleLoginBtn').addEventListener('click', () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    const msg = document.getElementById('googleMsg');
    msg.textContent = "Inafungua Google...";
    msg.className = "msg";

    auth.signInWithPopup(provider)
      .then((result) => {
        const user = result.user;
        // Create user profile in Firestore if it doesn't exist yet
        const userRef = db.collection("users").doc(user.uid);
        return userRef.get().then((doc) => {
          if (!doc.exists) {
            return userRef.set({
              username: user.displayName || user.email.split('@')[0],
              email: user.email,
              plan: "Free",
              dateCreated: new Date().toISOString(),
              lastLogin: new Date().toISOString()
            });
          } else {
            return userRef.set({ lastLogin: new Date().toISOString() }, { merge: true });
          }
        });
      })
      .then(() => {
        msg.textContent = "Umeingia! Inaelekeza...";
        msg.className = "msg success";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 600);
      })
      .catch((err) => {
        msg.textContent = translateError(err.code);
        msg.className = "msg error";
      });
  });

  // ===== REGISTER =====
  registerForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const msg = document.getElementById('registerMsg');
    const btn = document.getElementById('registerBtn');

    btn.disabled = true;
    btn.textContent = "Inajisajili...";
    msg.textContent = "";
    msg.className = "msg";

    auth.createUserWithEmailAndPassword(email, password)
      .then((cred) => {
        return db.collection("users").doc(cred.user.uid).set({
          username: username,
          email: email,
          plan: "Free",
          dateCreated: new Date().toISOString(),
          lastLogin: new Date().toISOString()
        });
      })
      .then(() => {
        msg.textContent = "Akaunti imefanikiwa! Inaelekeza...";
        msg.className = "msg success";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 800);
      })
      .catch((err) => {
        msg.textContent = translateError(err.code);
        msg.className = "msg error";
        btn.disabled = false;
        btn.textContent = "Jisajili";
      });
  });

  // ===== FORGOT PASSWORD =====
  document.getElementById('forgotLink').addEventListener('click', (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const msg = document.getElementById('loginMsg');
    if (!email) {
      msg.textContent = "Weka barua pepe yako kwanza";
      msg.className = "msg error";
      return;
    }
    auth.sendPasswordResetEmail(email)
      .then(() => {
        msg.textContent = "Barua pepe ya kurejesha nenosiri imetumwa";
        msg.className = "msg success";
      })
      .catch((err) => {
        msg.textContent = translateError(err.code);
        msg.className = "msg error";
      });
  });

  // ===== AUTO REDIRECT IF ALREADY LOGGED IN =====
  auth.onAuthStateChanged((user) => {
    if (user) {
      // Saved session found -> go straight to account
      window.location.href = "index.html";
    } else {
      // No saved session -> show login form
      document.getElementById('authCheck').style.display = 'none';
      document.getElementById('loginCard').classList.remove('hidden');
    }
  });

  // ===== ERROR TRANSLATION (Swahili) =====
  function translateError(code) {
    const errors = {
      "auth/invalid-email": "Barua pepe si sahihi",
      "auth/user-not-found": "Akaunti haipo, jisajili kwanza",
      "auth/wrong-password": "Nenosiri si sahihi",
      "auth/email-already-in-use": "Barua pepe hii imesajiliwa tayari",
      "auth/weak-password": "Nenosiri ni dhaifu (angalau herufi 6)",
      "auth/network-request-failed": "Tatizo la mtandao, jaribu tena",
      "auth/too-many-requests": "Majaribio mengi, subiri kidogo",
      "auth/invalid-credential": "Taarifa za kuingia si sahihi",
      "auth/popup-closed-by-user": "Umefunga dirisha la Google kabla ya kukamilisha",
      "auth/cancelled-popup-request": "Jaribio limeghairiwa, jaribu tena",
      "auth/account-exists-with-different-credential": "Barua pepe hii imesajiliwa kwa njia tofauti"
    };
    return errors[code] || "Hitilafu imetokea, jaribu tena";
  }
</script>

</body>
</html>
